<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RS Club Manager V6.2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
:root{
--bg:#0F172A;
--header:#111827;
--card:#1E293B;
--yellow:#FFD600;
--red:#E53935;
--white:#FFF;
--grey:#94A3B8;
}
body{
background:var(--bg);
color:var(--white);
max-width:480px;
margin:auto;
min-height:100vh;
overflow-x:hidden;
user-select:none;
-webkit-tap-highlight-color:transparent;
}
header{
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 16px;
background:var(--header);
border-bottom:3px solid var(--yellow);
}
.logoArea{display:flex;align-items:center;gap:12px}
.logoCircle{
width:46px;height:46px;border-radius:50%;
background:var(--yellow);color:#000;
display:flex;align-items:center;justify-content:center;
font-size:24px;font-weight:bold;
}
.logo{font-size:22px;font-weight:bold;color:var(--yellow)}
.version{font-size:12px;color:var(--grey)}
.menuButton{
width:44px;height:44px;border:none;border-radius:12px;
background:#222;color:#fff;font-size:22px;
}
main{padding:16px;padding-bottom:90px}
.page{display:none}
.page.active{display:block}
.card{
background:var(--card);
border-radius:16px;
padding:18px;
margin-bottom:14px;
}
.card h2{color:var(--yellow);margin-bottom:8px}
.nextMatch{

    border:2px solid var(--yellow);

}
.syncBtn{

width:100%;

padding:14px;

border:none;

border-radius:12px;

background:#FFD600;

color:#000;

font-size:18px;

font-weight:bold;

cursor:pointer;

margin-top:15px;

}

.syncBtn:hover{

opacity:.9;

}

.matchHeader{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:18px;

    font-size:13px;

    color:var(--grey);

}

#countdown{

    color:var(--yellow);

    font-weight:bold;

}

.teams{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin:20px 0;

}

.team{

    width:40%;

    text-align:center;

}

.teamLogo{

    width:70px;

    height:70px;

    margin:auto;

    border-radius:50%;

    background:#2B3648;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:30px;

}

.teamName{

    margin-top:10px;

    font-weight:bold;

}

.vs{

    font-size:26px;

    color:var(--yellow);

    font-weight:bold;

}

.matchInfo{

    margin-top:10px;

    color:var(--grey);

    text-align:center;

}
nav{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:480px;
height:70px;
display:flex;
background:var(--header);
border-top:2px solid var(--yellow);
}
nav button{
flex:1;
border:none;
background:none;
color:#fff;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:3px;
font-size:11px;
transition:.2s;
}
nav button.active{color:var(--yellow);transform:translateY(-3px)}
</style>
</head>
<body>

<header>

    <div class="logoArea">

        <div class="logoCircle">⚽</div>

        <div>

            <div class="logo">

                RS CLUB MANAGER

            </div>

            <div id="todayDate" class="version">

                Cargando fecha...

            </div>

        </div>

    </div>

    <button class="menuButton">

        ☰

    </button>

</header>
<main>

<section id="home" class="page active">
<div class="card nextMatch">

    <div class="matchHeader">

        <span>PRÓXIMO PARTIDO</span>

        <span id="countdown">Cargando...</span>

    </div>

    <div class="teams">

        <div class="team">

            <div class="teamLogo" id="homeLogo">🟡🔴</div>

            <div class="teamName" id="homeTeam"></div>

        </div>

        <div class="vs">

            VS

        </div>

        <div class="team">

            <div class="teamLogo" id="awayLogo">⚪</div>

            <div class="teamName" id="awayTeam"></div>

        </div>

    </div>

    <div class="matchInfo" id="matchDate"></div>

    <div class="matchInfo" id="matchHour"></div>

    <div class="matchInfo" id="matchField"></div>
<div class="matchInfo" id="matchCompetition"></div>

<div class="matchInfo" id="matchRound"></div>
<div class="matchInfo" id="matchCompetition"></div>

<div class="matchInfo" id="matchRound"></div>
</div>
<div class="card">

<h2>🏆 Clasificación</h2>

<div id="classificationHome">

Sin datos

</div>

</div>
<div class="card"><h2>⚽ Último resultado</h2><p>Sin resultados.</p></div>
<div class="card"><h2>👑 Goleadores</h2><p>No hay datos.</p></div>
</section>

<section id="players" class="page"><div class="card"><h2>Jugadores</h2></div></section>
<section id="matches" class="page"><div class="card"><h2>Partidos</h2></div></section>
<section id="classification" class="page"><div class="card"><h2>Clasificación</h2></div></section>
<section id="statistics" class="page"><div class="card"><h2>Estadísticas</h2></div></section>
<section id="admin" class="page">

<div class="card">

<h2>⚙️ Administración</h2>

<button onclick="FCF.sync()" class="syncBtn">

🔄 Sincronizar FCF

</button>

<p id="syncStatus">

Sin sincronizar

</p>

</div>

</section>

</main>

<nav>
<button class="active" onclick="openPage('home',this)">🏠<br>Inicio</button>
<button onclick="openPage('players',this)">👥<br>Jugadores</button>
<button onclick="openPage('matches',this)">⚽<br>Partidos</button>
<button onclick="openPage('classification',this)">🏆<br>Liga</button>
<button onclick="openPage('statistics',this)">📊<br>Stats</button>
<button onclick="openPage('admin',this)">⚙️<br>Admin</button>
</nav>

<script>
const App = {

    version: "6.2",

    club: {
        name: "Ramón Sicart",
        season: "2026 / 2027",
        category: "Cadete",
        colors: {
            primary: "#FFD600",
            secondary: "#E53935"
        }
    },
teams:[

{
    id:1,
    name:"Ramón Sicart",
    short:"RS",
    logo:"",
    color:"#FFD600",
    field:"Municipal",
    city:"Llorenç del Penedès",
    maps:"",
    competition:"Liga"
},

{
    id:2,
    name:"FC Barcelona",
    short:"FCB",
    logo:"",
    color:"#004D98",
    field:"Ciutat Esportiva Joan Gamper",
    city:"Sant Joan Despí",
    maps:"",
    competition:"Liga"
}

],
    players: [],

    matches: [],

    training: [],

    classification: [],

    scorers: [],

    notifications: [],

    statistics: {

        matchesPlayed: 0,
        wins: 0,
        draws: 0,
        losses: 0,
        goalsFor: 0,
        goalsAgainst: 0

    },

    settings: {

        darkMode: true,
        animations: true

    }

};
function loadDemoData(){

    App.matches = [

        {

            home:1,

away:2,

            date:"2026-09-12",

            hour:"18:00",

            field:"Municipal"

        }

    ];

}
function getTeam(id){

    return App.teams.find(team=>team.id===id);

}
function startCountdown(){

    if(App.matches.length===0) return;

    const match=App.matches[0];

    const target=new Date(match.date+"T"+match.hour+":00");

    function update(){

        const now=new Date();

        const diff=target-now;

        if(diff<=0){

            document.getElementById("countdown").innerHTML=`
<div style="font-size:20px;font-weight:bold;">
${days}d
</div>

<div style="font-size:12px">
${hours}h ${minutes}m ${seconds}s
</div>
`;
            return;

        }

        const days=Math.floor(diff/(1000*60*60*24));

        const hours=Math.floor((diff/(1000*60*60))%24);

        const minutes=Math.floor((diff/(1000*60))%60);

        const seconds=Math.floor((diff/1000)%60);

       document.getElementById("countdown").innerHTML=`
<div style="font-size:20px;font-weight:bold;">
${days}d
</div>

<div style="font-size:12px">
${hours}h ${minutes}m ${seconds}s
</div>
`;

    }

    update();

    setInterval(update,1000);

}
function loadNextMatch(){

    if(App.matches.length===0) return;

    const match=App.matches[0];

    const home=getTeam(match.home);

    const away=getTeam(match.away);

    document.getElementById("homeTeam").innerHTML=home.name;

    document.getElementById("awayTeam").innerHTML=away.name;

    document.getElementById("matchDate").innerHTML="📅 "+match.date;

    document.getElementById("matchHour").innerHTML="🕒 "+match.hour;

    document.getElementById("matchField").innerHTML="📍 "+home.field;
document.getElementById("matchCompetition").innerHTML=
"🏆 "+match.competition;

document.getElementById("matchRound").innerHTML=
"📅 Jornada "+match.round;

}
function renderClassification(){

    const div=document.getElementById("classificationHome");

    if(!div) return;

    if(App.classification.length===0){

        div.innerHTML="Sin datos";

        return;

    }

    let html="";

    App.classification.slice(0,5).forEach(team=>{

        html+=`
        <div style="
            display:flex;
            justify-content:space-between;
            padding:6px 0;
            border-bottom:1px solid #333;
        ">
            <span>${team.position}</span>
            <span>${team.name}</span>
            <strong>${team.points}</strong>
        </div>
        `;

    });

    div.innerHTML=html;

}
function updateDate(){

    const dias=[
        "Domingo",
        "Lunes",
        "Martes",
        "Miércoles",
        "Jueves",
        "Viernes",
        "Sábado"
    ];

    const meses=[
        "Enero","Febrero","Marzo","Abril",
        "Mayo","Junio","Julio","Agosto",
        "Septiembre","Octubre","Noviembre","Diciembre"
    ];

    const hoy=new Date();

    document.getElementById("todayDate").innerHTML=

        dias[hoy.getDay()] + ", " +

        hoy.getDate() + " " +

        meses[hoy.getMonth()] + " " +

        hoy.getFullYear();

}
function openPage(page,btn){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(page).classList.add('active');
document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}
updateDate();

function loadDemoData(){

    App.matches=[{

    id:1,

    competition:"Lliga",

    round:1,

    home:1,

    away:2,

    date:"2026-09-12",

    hour:"18:00",

    stadium:"Municipal de Llorenç",

    address:"Llorenç del Penedès",

    maps:"",

    status:"scheduled",

    homeGoals:null,

    awayGoals:null

}];

}

loadNextMatch();
const FCF = {

    endpoint:"/api/fcf",

    async sync(){

        const status=document.getElementById("syncStatus");

        status.innerHTML="🟡 Sincronizando...";

        try{

            const response=await fetch(this.endpoint,{
                cache:"no-store"
            });

            if(!response.ok){

                throw new Error("Error servidor");

            }

            const data=await response.json();

            App.teams=data.teams || [];

            App.matches=data.matches || [];

            App.classification=data.classification || [];

            App.scorers=data.scorers || [];

            loadNextMatch();

            startCountdown();

            localStorage.setItem(
                "fcf-cache",
                JSON.stringify(data)
            );

            localStorage.setItem(
                "fcf-last-sync",
                new Date().toISOString()
            );

            status.innerHTML="🟢 Sincronizado";

        }

        catch(e){

            status.innerHTML="🔴 Sin conexión";

            const cache=localStorage.getItem("fcf-cache");

            if(cache){

                const data=JSON.parse(cache);

                App.teams=data.teams || [];

                App.matches=data.matches || [];

                App.classification=data.classification || [];

                App.scorers=data.scorers || [];

                loadNextMatch();

                startCountdown();

            }

        }

    }

};
startCountdown();
window.addEventListener("load",()=>{

    const cache=localStorage.getItem("fcf-cache");

    if(cache){

        const data=JSON.parse(cache);

        App.teams=data.teams;

        App.matches=data.matches;

        App.classification=data.classification;

        App.scorers=data.scorers;

        loadNextMatch();

        startCountdown();

    }

});
</script>

</body>
</html>
