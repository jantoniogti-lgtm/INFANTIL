<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CATA Comandes V2.0</title>
<style>
body{font-family:Arial,sans-serif;background:#eef2f7;margin:0;padding:20px}
.card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.1);margin-bottom:15px}
.logo{max-height:100px;display:block;margin:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
input,textarea{
    padding:10px;
    width:100%;
    box-sizing:border-box;
}

button{
    padding:10px;
    box-sizing:border-box;
}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:6px}
th{background:#f0f0f0}
.toolbar{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    flex-wrap:nowrap;
    margin:15px 0;
}

.toolbar button{
    width:auto;
    min-width:180px;
    padding:12px 15px;
    font-weight:bold;
}
@media print {
 body * {visibility:hidden}
 #printArea, #printArea * {visibility:visible}
 #printArea {position:absolute;left:0;top:0;width:100%}
}

#printArea h1{margin:0}
#printArea .cap{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
#printArea .resum{margin-top:15px;font-weight:bold}
#printArea .obs{margin-top:30px}

@media print {

  @page{
    size:A4;
    margin:10mm;
  }

  #printArea{
    width:100%;
    page-break-after:auto;
  }

}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js">
document.addEventListener('DOMContentLoaded',()=>{
 const pdfInput=document.getElementById('pdfTrumpf');
 if(!pdfInput) return;

 pdfInput.addEventListener('change', async function(e){
   const file=e.target.files[0];
   if(!file) return;

   try{
     const data=await file.arrayBuffer();
     const pdf=await pdfjsLib.getDocument({data}).promise;

     let texto='';
     for(let p=1;p<=pdf.numPages;p++){
       const page=await pdf.getPage(p);
       const content=await page.getTextContent();
       texto+=' '+content.items.map(i=>i.str).join(' ');
     }

     let perfil='';
     let m=texto.match(/(\d+_[0-9X]+_\d+_\d+)/);
     if(m) perfil=m[1];

     let tubos=1;
     m=texto.match(/Numero\s+de\s+tubos[^0-9]*(\d+)/i);
     if(m) tubos=parseInt(m[1]);

     let longitud=6000;
     m=texto.match(/Longitud\s+material\s+bruto[^0-9]*([\d\.]+)/i);
     if(m) longitud=parseInt(m[1]);

     if(!perfil){ alert('No s\'ha trobat el perfil al PDF'); return; }

     const materials={1:'Tub Ferro',2:'Tub Inox',3:'Tub Alumini',5:'Tub Galva'};
     let material='',forma='',mida='';

     if(perfil.startsWith('0_')){
       let p=perfil.split('_');
       forma='Rodó';
       material=materials[p[2]]||'Tub Ferro';
       mida=(Number(p[1])/10)+'x'+(Number(p[3])/10);
     }else{
       let p=perfil.split('_');
       let d=p[1].split('X');
       let a=Number(d[0])/10,b=Number(d[1])/10,g=Number(p[3])/10;
       forma=(a===b)?'Quadrat':'Rectangular';
       material=materials[p[2]]||'Tub Ferro';
       mida=a+'x'+b+'x'+g;
     }

     pedidos.push({
       fecha:new Date().toLocaleDateString('es-ES'),
       cliente:'TRUMPF',
       comanda:'',
       material:material,
       forma:forma,
       medida:mida,
       longitud:longitud,
       cantidad:tubos,
       obs:'Importat PDF Trumpf'
     });

     guardar();
     render();
     alert('PDF importat correctament');
   }catch(err){
     alert('Error llegint PDF: '+err);
   }
 });
});

</script>

<script>
let pedidos=JSON.parse(localStorage.getItem('cata_v20_pedidos')||'[]');
let clientes=JSON.parse(localStorage.getItem('cata_v20_clientes')||'[]');
let medidas=JSON.parse(localStorage.getItem('cata_v20_medidas')||'{}');

function sim(f){
 if(f==='Rodó') return 'Ø ';
 if(f==='Quadrat') return '□ ';
 if(f==='Rectangular') return '▭ ';
 return '';
}

function guardar(){
localStorage.setItem('cata_v20_pedidos',JSON.stringify(pedidos));
localStorage.setItem('cata_v20_clientes',JSON.stringify(clientes));
localStorage.setItem('cata_v20_medidas',JSON.stringify(medidas));
}

function cargarClients(){
clientes.sort();
document.getElementById('clientes').innerHTML=clientes.map(c=>'<option value="'+c+'">').join('');
}

function actualizarMidas(){

 let f=document.getElementById('forma').value;

 let arr=[...(medidas[f]||[])];

 arr.sort((a,b)=>{

   function valor(txt){
     txt=txt.toLowerCase();
     if(txt.includes('x')){
       let p=txt.split('x');
       return parseFloat(p[0]) || 0;
     }
     return parseFloat(txt) || 0;
   }

   return valor(a)-valor(b);

 });

 document.getElementById('medidas').innerHTML=
 arr.map(m=>'<option value="'+m+'">').join('');

}

function agregar(){
let c=cliente.value.trim();
if(c && !clientes.includes(c)) clientes.push(c);

let f=forma.value;
let m=medida.value.trim()
.replace(/\s+/g,'')
.replaceAll('X','x');
if(f&&m){
 if(!medidas[f]) medidas[f]=[];
 if(!medidas[f].includes(m)) medidas[f].push(m);
}

pedidos.push({
fecha:new Date().toLocaleDateString('es-ES'),
cliente:c,
comanda:comanda.value,
material:material.value,
forma:f,
medida:m,
longitud:longitud.value,
cantidad:Number(cantidad.value||0),
obs:obs.value
});

guardar();
cargarClients();
render();
}

function borrar(i){
if(confirm('Eliminar pedido?')){
pedidos.splice(i,1);
guardar();
render();
}
}

function vaciar(){
if(confirm('Buidar toda la lista?')){
pedidos=[];
guardar();
render();
}
}

}
