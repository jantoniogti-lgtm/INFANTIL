<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Partido en Directo</title>


<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:Oswald,sans-serif}
body{background:radial-gradient(circle at top,#252525,#090909 60%,#000);color:#fff;padding-bottom:85px}
header{background:linear-gradient(180deg,#1f1f1f,#090909)!important;border-bottom:4px solid #f4c430!important;box-shadow:0 8px 25px rgba(0,0,0,.6)}
.screen{padding:18px}
.score{
display:grid!important;
grid-template-columns:1fr auto 1fr;
gap:18px;
align-items:center;
background:linear-gradient(180deg,#1a1a1a,#111);
border:2px solid #f4c430;
border-radius:26px;
padding:24px;
margin:20px 0;
box-shadow:0 15px 35px rgba(0,0,0,.5)
}
.team{display:flex;flex-direction:column;align-items:center}
.logo{
max-width:100%!important;
max-height:100%!important;
width:auto!important;
height:auto!important;
object-fit:contain!important;
border:none!important;
border-radius:0!important;
background:transparent!important;
display:block;
}
#nombreLocal,#nombreVisitante{margin-top:10px;font-size:22px;font-weight:700}
.result{font-size:84px!important;color:#f4c430;text-shadow:0 0 15px rgba(244,196,48,.5)}
.timer{
background:#000;
border:2px solid #30ff75;
border-radius:14px;
width:140px;
margin:8px auto 4px;
padding:6px;
font-size:34px!important;
color:#30ff75;
text-align:center;
}
.events,.sectionCard{background:#171717;border-radius:22px;border-left:6px solid #f4c430;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.imageBox{border-radius:18px!important;background:#0d0d0d!important}
nav{background:#111!important;border-top:2px solid #f4c430}
nav button{font-size:16px!important}

.heroScore{
margin:20px 0;
padding:22px;
border-radius:28px;
background:linear-gradient(160deg,#262626,#0b0b0b);
border:3px solid #f4c430;
box-shadow:0 18px 40px rgba(0,0,0,.55);
}
.heroRow{
display:grid;
grid-template-columns:110px 1fr 110px;
align-items:center;
gap:12px;
}
.heroLogo{
width:100px;height:100px;border-radius:50%;
border:4px solid #f4c430;
object-fit:cover;
background:#222;
}
.heroCenter{text-align:center}
.heroResult{font-size:72px;font-weight:700;color:#ffd54a;line-height:1}
.livePill{
display:inline-block;
padding:7px 18px;
margin:10px 0;
border-radius:20px;
background:#d00000;
font-size:15px;
font-weight:bold;
}
.heroTimer{
font-size:34px;
color:#52ff84;
font-weight:700;
}
.sectionTitle{
font-size:28px;
text-align:center;
color:#ffd54a;
margin-bottom:14px;
}


.logoBox{
width:140px;
height:140px;
display:flex;
align-items:center;
justify-content:center;
margin:0 auto 10px;
padding:8px;
background:linear-gradient(180deg,#242424,#111);
border:2px solid #d4af37;
border-radius:22px;
box-shadow:0 8px 22px rgba(0,0,0,.45);
}

</style>


<style id="v21extra">
@keyframes scorePulse{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}
}
.scoreAnim{
animation:scorePulse .45s ease;
}
.goalEvent{
display:flex;
align-items:center;
gap:8px;
padding:6px 0;
border-bottom:1px solid rgba(255,255,255,.08);
}
.goalBall{
font-size:18px;
filter:drop-shadow(0 0 6px #f4c430);
}
</style>

</head>

<body>


<header style="background:linear-gradient(180deg,#202020,#111);border-bottom:3px solid #d4af37;color:white;padding:18px;text-align:center">
<div style="font-size:18px;color:#f3c340;font-weight:bold">🏆 COSTA DAURADA CUP 2026</div>
<div style="font-size:30px;font-weight:bold">PARTIDO EN DIRECTO</div>
<div style="font-size:15px;color:#ccc">INFANTIL S14</div>
</header>

<div style="margin:15px;background:rgba(20,20,20,.92);border:2px solid #d4af37;border-radius:18px;padding:15px;text-align:center">
<div style="font-size:18px">📅 <span id="fechaPartido">Sin definir</span></div>
<div style="font-size:18px;margin-top:5px">🕒 <span id="horaPartido">--:--</span></div>
<div style="margin-top:10px;color:#ffd54a;font-size:24px;font-weight:bold">⏳ <span id="cuentaAtras">Configura la fecha del partido</span></div>
</div>


<div id="inicio" class="screen active">


<div class="heroScore">
<div class="heroRow">
<div style="text-align:center">
<img id="logoLocal" class="heroLogo" src="">
<div id="nombreLocal">RAMON SICART</div>
</div>

<div class="heroCenter">
<div class="heroResult" id="resultado">0 - 0</div>
<div class="livePill">🔴 EN DIRECTO</div>
<div class="heroTimer" id="timer">00:00</div>
<div style="color:#ddd;font-size:18px;">1ª PARTE</div>
</div>

<div style="text-align:center">
<img id="logoVisitante" class="heroLogo" src="">
<div id="nombreVisitante">RIVAL</div>
</div>
</div>
</div>

<div class="events">
<h3 class="sectionTitle">⚽ EVENTOS DEL PARTIDO</h3>


<h3>Eventos</h3>


<div id="lista" style="display:grid;grid-template-columns:1fr 1fr;gap:18px;">
  <div style="border-right:1px solid #444;padding-right:10px;">
    <div style="text-align:center;color:#f3c340;font-weight:bold;margin-bottom:10px;">LOCAL</div>
    <div id="eventosLocal"></div>
  </div>
  <div style="padding-left:10px;">
    <div style="text-align:center;color:#f3c340;font-weight:bold;margin-bottom:10px;">VISITANTE</div>
    <div id="eventosVisitante"></div>
  </div>
</div>



</div>

<button onclick="admin()"
style="
position:fixed;
top:15px;
right:15px;
width:45px;
height:45px;
border-radius:50%;
background:#d4af37;
font-size:22px;
">
⚙️
</button>

<!-- PANEL ADMIN -->
<div id="adminPanel" style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
z-index:9999;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
padding:15px;
">
<div style="
background:#222;
max-width:430px;
margin:20px auto;
padding:20px;
border-radius:16px;
color:#fff;
max-height:calc(100vh - 40px);
overflow-y:auto;
-webkit-overflow-scrolling:touch;
border:2px solid #d4af37;
">
<h2 style="margin-bottom:12px;">⚙️ Administrador</h2>

<label>Equipo local</label><br>
<input id="editLocal" style="width:100%;padding:8px;margin:5px 0 10px"><br>

<label>Equipo visitante</label><br>
<input id="editVisitante" style="width:100%;padding:8px;margin:5px 0 10px"><br>

<label>Escudo local</label><br>
<input type="file" id="fileLocal" accept="image/*"><br><br>

<label>Escudo visitante</label><br>
<input type="file" id="fileVisitante" accept="image/*"><br><br>


<hr style="margin:15px 0;border-color:#555">
<h3>Control del partido</h3>
<div style="text-align:center">
<button class="green" onclick="primeraParte()">▶ 1ª Parte</button>
<button class="green" onclick="segundaParte()">▶ 2ª Parte</button>
<button class="orange" onclick="pause()">⏸ Pausa</button>
<button class="red" onclick="terminarPartido()">🏁 Terminado</button>
<button class="red" onclick="reset()">🔄 Reset</button><br>
<button class="blue" onclick="golLocal()">+ Gol Local</button>
<button class="red" onclick="golVisitante()">+ Gol Visitante</button>
</div>
<br>

<hr>
<h3>Imágenes</h3>

<label>Alineación (1200x900)</label><br>
<input type="file" id="fileAlineacion" accept="image/*">
<button type="button" onclick="borrarImagen('Alineacion')">🗑️ Quitar</button><br><br>

<label>Clasificación (1600x700)</label><br>
<input type="file" id="fileClasificacion" accept="image/*">
<button type="button" onclick="borrarImagen('Clasificacion')">🗑️ Quitar</button><br><br>

<label>Resultados (1600x700)</label><br>
<input type="file" id="fileResultados" accept="image/*">
<button type="button" onclick="borrarImagen('Resultados')">🗑️ Quitar</button><br><br>


<label>Fecha del partido</label><br>
<input type="date" id="editFecha" style="width:100%;padding:8px"><br><br>

<label>Hora del partido</label><br>
<input type="time" id="editHora" style="width:100%;padding:8px"><br><br>

<button onclick="guardarAdmin()" style="background:#28a745;color:#fff;">Guardar</button>
<button onclick="cerrarAdmin()" style="background:#dc3545;color:#fff;">Cerrar</button>
</div>
</div>

<nav><button onclick="mostrar('inicio')">🏠</button></nav>
<script src="https://www.gstatic.com/firebasejs/12.1.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/12.1.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyD3X8TTd9XPiFlByDxBxFBNqqjHuRxOkfU",
  authDomain: "costa-daurada-cup.firebaseapp.com",
  databaseURL: "https://costa-daurada-cup-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "costa-daurada-cup",
  storageBucket: "costa-daurada-cup.firebasestorage.app",
  messagingSenderId: "348811031231",
  appId: "1:348811031231:web:8a65cccce4870abb968c0a"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

function guardarFirebase(){

    firebase.database().ref("partido").set({

        local:nombreLocal.innerHTML,

        visitante:nombreVisitante.innerHTML,

        golesLocal:l,

        golesVisitante:v,

        tiempo:s,

        fase:fase,

        estado:estadoCrono,

        inicio:inicioCrono,

        eventosLocal:eventosLocal.innerHTML,

        eventosVisitante:eventosVisitante.innerHTML,

        logoLocal:logoLocal.src,

logoVisitante:logoVisitante.src,

imgAlineacion:document.getElementById("imgAlineacion").src || "",

imgClasificacion:document.getElementById("imgClasificacion").src || "",

imgResultados:document.getElementById("imgResultados").src || "",

fecha:fechaPartido.textContent,

hora:horaPartido.textContent

    });

}

let s=0;
let t=null;
let l=0;
let v=0;
let fase=0;

let estadoCrono="stop";
let inicioCrono=0;
function mostrar(id){

document.querySelectorAll(".screen").forEach(e=>e.classList.remove("active"));

document.getElementById(id).classList.add("active");

}
function iniciarCronoSincronizado(){

    if(t) clearInterval(t);

    t = setInterval(()=>{

        if(estadoCrono!="running") return;

        s = Math.floor((Date.now()-inicioCrono)/1000);

        if(fase==2)
            s += 25*60;

        if(fase==1 && s>=25*60){
            s=25*60;
            estadoCrono="pause";
        }

        if(fase==2 && s>=50*60){
            s=50*60;
            estadoCrono="finish";
        }

        pintar();

    },1000);

}
function pintar(){

let m=Math.floor(s/60).toString().padStart(2,"0");

let ss=(s%60).toString().padStart(2,"0");

timer.innerHTML=m+":"+ss;

}


function pause(){

    estadoCrono="pause";

    guardarFirebase();

}

function reset(){

    if(!confirm("¿Seguro que quieres reiniciar el partido?")) return;

    // Parar cronómetro
    pause();

    // Reiniciar tiempo
    s = 0;
    pintar();

    // Reiniciar marcador
    l = 0;
    v = 0;
    marcador();
    guardarFirebase();
    actualizarCuentaAtras();adaptarEscudos();

    // Borrar todos los eventos
    eventosLocal.innerHTML=""; eventosVisitante.innerHTML="";

}

function marcador(){
    resultado.innerHTML = l + " - " + v;
}

function golLocal(){

    l++;
    marcador();
    guardarFirebase();
    actualizarCuentaAtras();adaptarEscudos();

    let jugador = prompt("Nombre del goleador");

    if(!jugador) jugador = "Jugador";

    let minuto = prompt("¿En qué minuto ha sido el gol?");

    if(!minuto) minuto = Math.floor(s/60);

    eventosLocal.innerHTML += `<div class="goalEvent"><span class="goalBall">⚽</span><span>${minuto}\' ${jugador}</span></div>`;

}

function golVisitante(){

    v++;
    marcador();
    guardarFirebase();

    

    let minuto = prompt("¿En qué minuto ha sido el gol?");

    if(!minuto) minuto = Math.floor(s/60);

    eventosVisitante.innerHTML += `<div class="goalEvent"><span class="goalBall">⚽</span><span>${minuto}\' Gol</span></div>`;

}

function admin(){

    const pass = prompt("Introduce la contraseña");

    if(pass !== "2990"){
        alert("Contraseña incorrecta");
        return;
    }

    document.getElementById('adminPanel').style.display='block';document.body.style.overflow='hidden';
    editLocal.value=nombreLocal.innerHTML;
    editVisitante.value=nombreVisitante.innerHTML;
editFecha.value=localStorage.getItem('fechaPartido')||'';
editHora.value=localStorage.getItem('horaPartido')||'';

}

function cerrarAdmin(){
 document.getElementById('adminPanel').style.display='none';document.body.style.overflow='auto';
}
function leerImagen(inputId,imgId){

    return new Promise(resolve=>{

        const input=document.getElementById(inputId);

        if(!input.files.length){
            resolve();
            return;
        }

        const r=new FileReader();

        r.onload=e=>{

            document.getElementById(imgId).src=e.target.result;

            resolve();

        };

        r.readAsDataURL(input.files[0]);

    });

}
async function guardarAdmin(){
 nombreLocal.innerHTML=editLocal.value;
 nombreVisitante.innerHTML=editVisitante.value;

 localStorage.setItem('nombreLocal',nombreLocal.innerHTML);
 localStorage.setItem('nombreVisitante',nombreVisitante.innerHTML);
 localStorage.setItem('fechaPartido',editFecha.value);
 localStorage.setItem('horaPartido',editHora.value);

 fechaPartido.textContent=editFecha.value||'Sin definir';
 horaPartido.textContent=editHora.value||'--:--';

 await leerImagen("fileLocal","logoLocal");
 await leerImagen("fileVisitante","logoVisitante");
 await leerImagen("fileAlineacion","imgAlineacion");
 await leerImagen("fileClasificacion","imgClasificacion");
 await leerImagen("fileResultados","imgResultados");

 guardarFirebase();
 cerrarAdmin();
}


function primeraParte(){

    fase=1;

    estadoCrono="running";

    inicioCrono=Date.now();

    guardarFirebase();

}
function segundaParte(){

    fase=2;

    estadoCrono="running";

    inicioCrono=Date.now()-25*60*1000;

    guardarFirebase();

}
function terminarPartido(){
    pause();
    s=50*60;
    pintar();
    document.getElementById('timer').innerHTML='50:00<br><span style="font-size:24px;color:#d4af37;">TERMINADO</span>';
}


function actualizarCuentaAtras(){
 const f=localStorage.getItem('fechaPartido');
 const h=localStorage.getItem('horaPartido');
 if(!f||!h)return;
 fechaPartido.textContent=f;
 horaPartido.textContent=h;
 const d=new Date(f+"T"+h+":00");
 let ms=d-new Date();
 if(ms<=0){cuentaAtras.textContent="¡ES LA HORA DEL PARTIDO!";return;}
 const dd=Math.floor(ms/86400000);ms%=86400000;
 const hh=Math.floor(ms/3600000);ms%=3600000;
 const mm=Math.floor(ms/60000);ms%=60000;
 const ss=Math.floor(ms/1000);
 cuentaAtras.textContent=`${dd}d ${hh}h ${mm}m ${ss}s`;
}
setInterval(actualizarCuentaAtras,1000);


function borrarImagen(tipo){
 localStorage.removeItem('img'+tipo);
 const img=document.getElementById('img'+tipo);
 if(img) img.removeAttribute('src');
}


const _oldMarcador=marcador;
marcador=function(){
  _oldMarcador();
  const r=document.getElementById('resultado');
  if(r){
    r.classList.remove('scoreAnim');
    void r.offsetWidth;
    r.classList.add('scoreAnim');
  }
}


function adaptarEscudos(){
 ['logoLocal','logoVisitante'].forEach(id=>{
   const img=document.getElementById(id);
   if(!img) return;
   img.style.objectFit='contain';
   img.style.width='auto';
   img.style.height='auto';
   img.style.maxWidth='100%';
   img.style.maxHeight='100%';
 });
}


firebase.database().ref("partido").on("value",(snapshot)=>{
 const d=snapshot.val();
 if(!d) return;
estadoCrono = d.estado || "stop";
inicioCrono = d.inicio || 0;
fase = d.fase || 0;
iniciarCronoSincronizado();
 pintar();
 l=d.golesLocal||0;
 v=d.golesVisitante||0;
 nombreLocal.innerHTML=d.local||nombreLocal.innerHTML;
 nombreVisitante.innerHTML=d.visitante||nombreVisitante.innerHTML;
 resultado.innerHTML=l+" - "+v;
 if(d.eventosLocal!==undefined) eventosLocal.innerHTML=d.eventosLocal;
 if(d.eventosVisitante!==undefined) eventosVisitante.innerHTML=d.eventosVisitante;
 if(d.logoLocal) logoLocal.src=d.logoLocal;
 if(d.logoVisitante) logoVisitante.src=d.logoVisitante;
 if(d.imgAlineacion)
    document.getElementById("imgAlineacion").src=d.imgAlineacion;

if(d.imgClasificacion)
    document.getElementById("imgClasificacion").src=d.imgClasificacion;

if(d.imgResultados){
    document.getElementById("imgResultados").src=d.imgResultados;
    const dup=document.getElementById("imgResultadosPantalla");
    if(dup) dup.src=d.imgResultados;
}

if(d.fecha)
    fechaPartido.textContent=d.fecha;

if(d.hora)
    horaPartido.textContent=d.hora;
});

window.onload = () => {

    firebase.database().ref("partido").once("value").then((snapshot) => {

        const d = snapshot.val();

        if (d) {

            nombreLocal.innerHTML = d.local || "LOCAL";
            nombreVisitante.innerHTML = d.visitante || "VISITANTE";

            l = d.golesLocal || 0;
            v = d.golesVisitante || 0;

            s = 0;
            fase = d.fase || 0;

            if (d.eventosLocal) eventosLocal.innerHTML = d.eventosLocal;
            if (d.eventosVisitante) eventosVisitante.innerHTML = d.eventosVisitante;

            if (d.logoLocal) logoLocal.src = d.logoLocal;
            if (d.logoVisitante) logoVisitante.src = d.logoVisitante;
            if (d.imgAlineacion) document.getElementById('imgAlineacion').src = d.imgAlineacion;
            if (d.imgClasificacion) document.getElementById('imgClasificacion').src = d.imgClasificacion;
            if (d.imgResultados){
                document.getElementById('imgResultados').src = d.imgResultados;
                const dup=document.getElementById('imgResultadosPantalla');
                if(dup) dup.src=d.imgResultados;
            }
            if (d.fecha) fechaPartido.textContent=d.fecha;
            if (d.hora) horaPartido.textContent=d.hora;

        } else {

            // Primer uso: carga localStorage
            if(localStorage.getItem('nombreLocal'))
                nombreLocal.innerHTML = localStorage.getItem('nombreLocal');

            if(localStorage.getItem('nombreVisitante'))
                nombreVisitante.innerHTML = localStorage.getItem('nombreVisitante');

            if(localStorage.getItem('logoLocal'))
                logoLocal.src = localStorage.getItem('logoLocal');

            if(localStorage.getItem('logoVisitante'))
                logoVisitante.src = localStorage.getItem('logoVisitante');

        }

       pintar();
marcador();
iniciarCronoSincronizado();
actualizarCuentaAtras();
adaptarEscudos();

    });

};

</script>

</body>
</html>
