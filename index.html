<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Partido en Directo</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#111;color:#fff;padding-bottom:80px}
header{background:#d4af37;color:#000;padding:15px;text-align:center;font-size:24px;font-weight:bold}

.screen{display:none;padding:15px}
.screen.active{display:block}

.score{
display:flex;
justify-content:space-between;
align-items:center;
margin:20px 0;
}

.team{
width:35%;
text-align:center;
}

.logo{
width:80px;
height:80px;
border-radius:50%;
background:#333;
margin:auto;
margin-bottom:10px;
}

.result{
font-size:42px;
font-weight:bold;
}

.timer{
font-size:48px;
text-align:center;
margin:20px 0;
}

button{
padding:12px;
margin:5px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.green{background:#28a745;color:#fff;}
.red{background:#dc3545;color:#fff;}
.orange{background:#ff9800;color:#fff;}
.blue{background:#2196f3;color:#fff;}

.events{
background:#222;
padding:10px;
border-radius:10px;
margin-top:20px;
min-height:150px;
}

.imageBox{
width:100%;
height:300px;
border:2px dashed #555;
display:flex;
justify-content:center;
align-items:center;
border-radius:10px;
font-size:20px;
color:#888;
}

nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:65px;
background:#222;
display:flex;
}

nav button{
flex:1;
margin:0;
border-radius:0;
background:#222;
color:#fff;
border-right:1px solid #444;
}
</style>
</head>

<body>

<header>PARTIDO EN DIRECTO</header>

<div id="inicio" class="screen active">

<div class="score">

<div class="team">
    <img id="logoLocal" class="logo" src="" alt="Local">
    <div id="nombreLocal">RAMON SICART</div>
</div>

<div class="result" id="resultado">0 - 0</div>

<div class="team">
    <img id="logoVisitante" class="logo" src="" alt="Visitante">
    <div id="nombreVisitante">RIVAL</div>
</div>

</div>

<div class="timer" id="timer">00:00</div>



<div class="events">

<h3>Eventos</h3>

<div id="lista"></div>

</div>

</div>

<div id="alineacion" class="screen">

<img id="imgAlineacion" class="imageBox" style="object-fit:contain;background:#222" src="">

</div>

<div id="clasificacion" class="screen">

<img id="imgClasificacion" class="imageBox" style="object-fit:contain;background:#222" src="">

</div>

<div id="resultados" class="screen">

<img id="imgResultados" class="imageBox" style="object-fit:contain;background:#222" src="">

</div>

<button
onclick="admin()"
style="
position:fixed;
top:15px;
right:15px;
width:45px;
height:45px;
border-radius:50%;
background:#d4af37;
font-size:22px;
">
⚙️
</button>

<!-- PANEL ADMIN -->
<div id="adminPanel" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;">
<div style="background:#222;max-width:420px;margin:40px auto;padding:20px;border-radius:12px;color:#fff;">
<h2 style="margin-bottom:15px;">⚙️ Administrador</h2>

<label>Equipo local</label><br>
<input id="editLocal" style="width:100%;padding:8px;margin:5px 0 10px"><br>

<label>Equipo visitante</label><br>
<input id="editVisitante" style="width:100%;padding:8px;margin:5px 0 10px"><br>

<label>Escudo local</label><br>
<input type="file" id="fileLocal" accept="image/*"><br><br>

<label>Escudo visitante</label><br>
<input type="file" id="fileVisitante" accept="image/*"><br><br>


<hr style="margin:15px 0;border-color:#555">
<h3>Control del partido</h3>
<div style="text-align:center">
<button class="green" onclick="primeraParte()">▶ 1ª Parte</button>
<button class="green" onclick="segundaParte()">▶ 2ª Parte</button>
<button class="orange" onclick="pause()">⏸ Pausa</button>
<button class="red" onclick="terminarPartido()">🏁 Terminado</button>
<button class="red" onclick="reset()">🔄 Reset</button><br>
<button class="blue" onclick="golLocal()">+ Gol Local</button>
<button class="red" onclick="golVisitante()">+ Gol Visitante</button>
</div>
<br>

<hr>
<h3>Imágenes</h3>

<label>Alineación</label><br>
<input type="file" id="fileAlineacion" accept="image/*"><br><br>

<label>Clasificación</label><br>
<input type="file" id="fileClasificacion" accept="image/*"><br><br>

<label>Resultados</label><br>
<input type="file" id="fileResultados" accept="image/*"><br><br>

<button onclick="guardarAdmin()" style="background:#28a745;color:#fff;">Guardar</button>
<button onclick="cerrarAdmin()" style="background:#dc3545;color:#fff;">Cerrar</button>
</div>
</div>

<nav>

<button onclick="mostrar('inicio')">🏠</button>

<button onclick="mostrar('alineacion')">📋</button>

<button onclick="mostrar('clasificacion')">🏆</button>

<button onclick="mostrar('resultados')">⚽</button>

</nav>

<script>

let s=0;
let t=null;
let l=0;
let v=0;
let fase=0;

function mostrar(id){

document.querySelectorAll(".screen").forEach(e=>e.classList.remove("active"));

document.getElementById(id).classList.add("active");

}

function pintar(){

let m=Math.floor(s/60).toString().padStart(2,"0");

let ss=(s%60).toString().padStart(2,"0");

timer.innerHTML=m+":"+ss;

}

function start(){

if(t)return;

t=setInterval(()=>{

    s++;

    // Fin 1ª parte
    if(fase===1 && s>=25*60){
        pause();
        s=25*60;
        timer.innerHTML="25:00<br><span style='font-size:24px;color:#d4af37;'>DESCANSO</span>";
        return;
    }

    // Fin 2ª parte
    if(fase===2 && s>=50*60){
        pause();
        s=50*60;
        timer.innerHTML="50:00<br><span style='font-size:24px;color:#d4af37;'>TERMINADO</span>";
        return;
    }

    ['Alineacion','Clasificacion','Resultados'].forEach(n=>{const v=localStorage.getItem('img'+n);if(v)document.getElementById('img'+n).src=v;});
pintar();

},1000);

}

function pause(){

clearInterval(t);

t=null;

}

function reset(){

    if(!confirm("¿Seguro que quieres reiniciar el partido?")) return;

    // Parar cronómetro
    pause();

    // Reiniciar tiempo
    s = 0;
    pintar();

    // Reiniciar marcador
    l = 0;
    v = 0;
    marcador();

    // Borrar todos los eventos
    lista.innerHTML = "";

}

function marcador(){

resultado.innerHTML=l+" - "+v;

}

function golLocal(){

    l++;
    marcador();

    let jugador = prompt("Nombre del goleador");

    if(!jugador) jugador = "Jugador";

    let minuto = prompt("¿En qué minuto ha sido el gol?");

    if(!minuto) minuto = Math.floor(s/60);

    lista.innerHTML += "<p>⚽ " + minuto + "' " + jugador + "</p>";

}

function golVisitante(){

    v++;
    marcador();

    let minuto = prompt("¿En qué minuto ha sido el gol?");

    if(!minuto) minuto = Math.floor(s/60);

    lista.innerHTML += "<p>⚽ " + minuto + "' Gol visitante</p>";

}

function admin(){

    const pass = prompt("Introduce la contraseña");

    if(pass !== "2990"){
        alert("Contraseña incorrecta");
        return;
    }

    document.getElementById('adminPanel').style.display='block';
    editLocal.value=nombreLocal.innerHTML;
    editVisitante.value=nombreVisitante.innerHTML;

}

function cerrarAdmin(){
 document.getElementById('adminPanel').style.display='none';
}
function guardarAdmin(){
 nombreLocal.innerHTML=editLocal.value;
 nombreVisitante.innerHTML=editVisitante.value;

 const fl=fileLocal.files[0];
 if(fl){
   const r=new FileReader();
   r.onload=e=>{
      logoLocal.src=e.target.result;
      localStorage.setItem('logoLocal',e.target.result);
   };
   r.readAsDataURL(fl);
 }

 const fv=fileVisitante.files[0];
 if(fv){
   const r2=new FileReader();
   r2.onload=e=>{
      logoVisitante.src=e.target.result;
      localStorage.setItem('logoVisitante',e.target.result);
   };
   r2.readAsDataURL(fv);
 }

 localStorage.setItem('nombreLocal',nombreLocal.innerHTML);
 localStorage.setItem('nombreVisitante',nombreVisitante.innerHTML);
 
['Alineacion','Clasificacion','Resultados'].forEach(n=>{
 const inp=document.getElementById('file'+n);
 if(inp && inp.files.length){
   const r=new FileReader();
   r.onload=e=>{
      document.getElementById('img'+n).src=e.target.result;
      localStorage.setItem('img'+n,e.target.result);
   };
   r.readAsDataURL(inp.files[0]);
 }
});

cerrarAdmin();
}


function primeraParte(){
    fase=1;
    pause();
    s=0;
    pintar();
    start();
}
function segundaParte(){
    fase=2;
    pause();
    s=25*60;
    pintar();
    start();
}
function terminarPartido(){
    pause();
    s=50*60;
    pintar();
    document.getElementById('timer').innerHTML='50:00<br><span style="font-size:24px;color:#d4af37;">TERMINADO</span>';
}

window.onload=()=>{
 if(localStorage.getItem('nombreLocal')) nombreLocal.innerHTML=localStorage.getItem('nombreLocal');
 if(localStorage.getItem('nombreVisitante')) nombreVisitante.innerHTML=localStorage.getItem('nombreVisitante');
 if(localStorage.getItem('logoLocal')) logoLocal.src=localStorage.getItem('logoLocal');
 if(localStorage.getItem('logoVisitante')) logoVisitante.src=localStorage.getItem('logoVisitante');
 pintar();
 marcador();
};

</script>

</body>
</html>
